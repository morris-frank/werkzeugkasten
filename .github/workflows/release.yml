name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-15
    env:
      APP_NAME: Werkzeugkasten
      SCHEME: Werkzeugkasten
      ARCHIVE_PATH: build/Werkzeugkasten.xcarchive
      APP_PATH: build/dist/Werkzeugkasten.app
      ZIP_PATH: build/dist/Werkzeugkasten.zip
      CHECKSUM_PATH: build/dist/Werkzeugkasten.zip.sha256

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Create signing keychain
        run: |
          security create-keychain -p "$RUNNER_TEMP" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$RUNNER_TEMP" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security list-keychains -d user -s build.keychain login.keychain-db

      - name: Import Developer ID certificate
        env:
          CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD }}
        run: |
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          certificate = Path("build/developer-id-application.p12")
          certificate.parent.mkdir(parents=True, exist_ok=True)
          certificate.write_bytes(base64.b64decode(os.environ["CERT_BASE64"]))
          PY
          security import build/developer-id-application.p12 \
            -k build.keychain \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$RUNNER_TEMP" build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Show resolved signing settings
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild \
            -project Werkzeugkasten.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Release \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            OTHER_CODE_SIGN_FLAGS="--keychain build.keychain" \
            -showBuildSettings | \
            egrep "TARGET_NAME =|PRODUCT_BUNDLE_IDENTIFIER =|DEVELOPMENT_TEAM =|CODE_SIGN_STYLE =|CODE_SIGN_IDENTITY =|PROVISIONING_PROFILE_SPECIFIER ="

      - name: Archive release build
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild \
            -project Werkzeugkasten.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            OTHER_CODE_SIGN_FLAGS="--keychain build.keychain" \
            archive

      - name: Prepare distributable app
        run: |
          mkdir -p build/dist
          rm -rf "$APP_PATH"
          cp -R "$ARCHIVE_PATH/Products/Applications/$APP_NAME.app" "$APP_PATH"

      - name: Create notarization zip
        run: |
          rm -f "$ZIP_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_PATH"

      - name: Notarize zip
        env:
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
        run: |
          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_NOTARY_APPLE_ID" \
            --password "$APPLE_NOTARY_PASSWORD" \
            --team-id "$APPLE_NOTARY_TEAM_ID" \
            --wait

      - name: Staple notarization ticket
        run: xcrun stapler staple "$APP_PATH"

      - name: Rebuild final zip and checksum
        run: |
          rm -f "$ZIP_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_PATH"
          shasum -a 256 "$ZIP_PATH" > "$CHECKSUM_PATH"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ZIP_PATH }}
            ${{ env.CHECKSUM_PATH }}
