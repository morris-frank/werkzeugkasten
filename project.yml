name: WerkzeugkastenShelf
options:
  minimumXcodeGenVersion: 2.45.0
  disableAutogeneratedSchemes: true
  deploymentTarget:
    macOS: "15.0"
settings:
  base:
    CC: clang
    CXX: clang++
    AR: ar
    LD: clang
    LIBTOOL: libtool
    NM: nm
    RANLIB: ranlib
    CLANG_ENABLE_EXPLICIT_MODULES: NO
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 15.0
    PRODUCT_NAME: $(TARGET_NAME)
targets:
  WerkzeugkastenCore:
    type: framework
    platform: macOS
    sources:
      - path: WerkzeugkastenCore
      - path: werkzeugkasten_engine
        buildPhase: resources
        excludes:
          - __pycache__
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: local.mfr.werkzeugkasten.core
  WerkzeugkastenApp:
    type: application
    platform: macOS
    sources:
      - path: WerkzeugkastenApp
    entitlements:
      path: Config/WerkzeugkastenApp.entitlements
    dependencies:
      - target: WerkzeugkastenCore
        embed: true
      - target: WerkzeugkastenActionExtension
        embed: true
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_NAME: WerkzeugkastenShelf
        PRODUCT_BUNDLE_IDENTIFIER: local.mfr.werkzeugkasten.app
        INFOPLIST_KEY_CFBundleDisplayName: Shortcut Shelf
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_WerkzeugkastenKeychainAccessGroup: $(AppIdentifierPrefix)local.mfr.werkzeugkasten.shared
  WerkzeugkastenActionExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: WerkzeugkastenActionExtension
    info:
      path: Config/WerkzeugkastenActionExtension-Info.plist
    entitlements:
      path: Config/WerkzeugkastenActionExtension.entitlements
    dependencies:
      - target: WerkzeugkastenCore
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: local.mfr.werkzeugkasten.action
        INFOPLIST_KEY_WerkzeugkastenKeychainAccessGroup: $(AppIdentifierPrefix)local.mfr.werkzeugkasten.shared
  WerkzeugkastenCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: WerkzeugkastenCoreTests
    dependencies:
      - target: WerkzeugkastenCore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: local.mfr.werkzeugkasten.core.tests
schemes:
  WerkzeugkastenShelf:
    build:
      targets:
        WerkzeugkastenApp: all
        WerkzeugkastenCore: [running, testing, archiving, profiling, analyzing]
        WerkzeugkastenActionExtension: all
    run:
      executable: WerkzeugkastenApp
      macroExpansion: WerkzeugkastenApp
      askForAppToLaunch: false
    test:
      macroExpansion: WerkzeugkastenApp
      targets:
        - WerkzeugkastenCoreTests
    management:
      shared: true
      isShown: true
