name: ShortcutShelf
options:
  minimumXcodeGenVersion: 2.45.0
  disableAutogeneratedSchemes: true
  deploymentTarget:
    macOS: "15.0"
settings:
  base:
    CC: clang
    CXX: clang++
    AR: ar
    LD: clang
    LIBTOOL: libtool
    NM: nm
    RANLIB: ranlib
    CLANG_ENABLE_EXPLICIT_MODULES: NO
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 15.0
    PRODUCT_NAME: $(TARGET_NAME)
targets:
  ShortcutsCore:
    type: framework
    platform: macOS
    sources:
      - path: ShortcutsCore
      - path: shortcuts_engine
        buildPhase: resources
        excludes:
          - __pycache__
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: local.mfr.shortcuts.core
  ShortcutsApp:
    type: application
    platform: macOS
    sources:
      - path: ShortcutsApp
    entitlements:
      path: Config/ShortcutsApp.entitlements
    dependencies:
      - target: ShortcutsCore
        embed: true
      - target: ShortcutsActionExtension
        embed: true
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_NAME: ShortcutShelf
        PRODUCT_BUNDLE_IDENTIFIER: local.mfr.shortcuts.app
        INFOPLIST_KEY_CFBundleDisplayName: Shortcut Shelf
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_ShortcutsKeychainAccessGroup: $(AppIdentifierPrefix)local.mfr.shortcuts.shared
  ShortcutsActionExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: ShortcutsActionExtension
    info:
      path: Config/ShortcutsActionExtension-Info.plist
    entitlements:
      path: Config/ShortcutsActionExtension.entitlements
    dependencies:
      - target: ShortcutsCore
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: local.mfr.shortcuts.action
        INFOPLIST_KEY_ShortcutsKeychainAccessGroup: $(AppIdentifierPrefix)local.mfr.shortcuts.shared
  ShortcutsCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ShortcutsCoreTests
    dependencies:
      - target: ShortcutsCore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: local.mfr.shortcuts.core.tests
schemes:
  ShortcutShelf:
    build:
      targets:
        ShortcutsApp: all
        ShortcutsCore: [running, testing, archiving, profiling, analyzing]
        ShortcutsActionExtension: all
    run:
      executable: ShortcutsApp
      macroExpansion: ShortcutsApp
      askForAppToLaunch: false
    test:
      macroExpansion: ShortcutsApp
      targets:
        - ShortcutsCoreTests
    management:
      shared: true
      isShown: true
