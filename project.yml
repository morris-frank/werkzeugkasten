name: Werkzeugkasten
options:
  minimumXcodeGenVersion: 2.44.1
  disableAutogeneratedSchemes: true
  deploymentTarget:
    macOS: "15.0"
settings:
  base:
    CC: clang
    CXX: clang++
    AR: ar
    LD: clang
    LIBTOOL: libtool
    NM: nm
    RANLIB: ranlib
    CLANG_ENABLE_EXPLICIT_MODULES: NO
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 15.0
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    PRODUCT_NAME: $(TARGET_NAME)
targets:
  WerkzeugkastenCore:
    type: framework
    platform: macOS
    sources:
      - path: WerkzeugkastenCore
      - path: werkzeugkasten_engine
        buildPhase: resources
        excludes:
          - __pycache__
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.mauricefrank.werkzeugkasten.core
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: Apple Development
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Developer ID Application
          PROVISIONING_PROFILE_SPECIFIER: ""
  WerkzeugkastenApp:
    type: application
    platform: macOS
    sources:
      - path: WerkzeugkastenApp
    entitlements:
      path: Config/WerkzeugkastenApp.entitlements
    dependencies:
      - target: WerkzeugkastenCore
        embed: true
      - target: WerkzeugkastenActionExtension
        embed: true
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Config/WerkzeugkastenApp-Info.plist
        ENABLE_HARDENED_RUNTIME: YES
        PRODUCT_NAME: Werkzeugkasten
        PRODUCT_BUNDLE_IDENTIFIER: com.mauricefrank.werkzeugkasten
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: Apple Development
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Developer ID Application
          PROVISIONING_PROFILE_SPECIFIER: ""
  WerkzeugkastenActionExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: WerkzeugkastenActionExtension
    info:
      path: Config/WerkzeugkastenActionExtension-Info.plist
    entitlements:
      path: Config/WerkzeugkastenActionExtension.entitlements
    dependencies:
      - target: WerkzeugkastenCore
        embed: true
    settings:
      base:
        ENABLE_HARDENED_RUNTIME: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.mauricefrank.werkzeugkasten.action
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: Apple Development
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Developer ID Application
          PROVISIONING_PROFILE_SPECIFIER: ""
  WerkzeugkastenCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: WerkzeugkastenCoreTests
    dependencies:
      - target: WerkzeugkastenCore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleShortVersionString: $(MARKETING_VERSION)
        INFOPLIST_KEY_CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        PRODUCT_BUNDLE_IDENTIFIER: com.mauricefrank.werkzeugkasten.core.tests
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: Apple Development
        Release:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: Apple Development
schemes:
  Werkzeugkasten:
    build:
      targets:
        WerkzeugkastenApp: all
        WerkzeugkastenCore: [running, testing, archiving, profiling, analyzing]
        WerkzeugkastenActionExtension: all
    run:
      executable: WerkzeugkastenApp
      macroExpansion: WerkzeugkastenApp
      askForAppToLaunch: false
    test:
      macroExpansion: WerkzeugkastenApp
      targets:
        - WerkzeugkastenCoreTests
    management:
      shared: true
      isShown: true
